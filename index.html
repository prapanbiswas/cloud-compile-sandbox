<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Web IDE Bundle Packager</title>
    <style>
        :root {
            --bg-main: #090a0f;
            --bg-card: #141622;
            --bg-input: #1f2234;
            --accent: #7aa2f7;
            --accent-glow: rgba(122, 162, 247, 0.3);
            --text-main: #c0caf5;
            --text-muted: #565f89;
            --success: #9ece6a;
            --error: #f7768e;
            --warning: #e0af68;
            --border: #24283b;
            --nav-height: 60px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- Top Navigation Bar --- */
        .top-nav {
            height: var(--nav-height);
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .menu-btn:active {
            background-color: var(--bg-input);
        }

        .app-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .btn-compile {
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-compile:active {
            transform: scale(0.95);
        }

        .btn-compile:disabled {
            background-color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- Workspace Container View Switcher --- */
        .workspace-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        #viewEditor {
            transform: translateX(0%);
            background-color: var(--bg-main);
        }

        #viewExecution {
            transform: translateX(100%);
            background-color: var(--bg-main);
            z-index: 5;
        }

        body.show-execution #viewEditor {
            transform: translateX(-100%);
        }

        body.show-execution #viewExecution {
            transform: translateX(0%);
        }

        /* --- Code Editor Layout Canvas --- */
        #codeEditor {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            background-color: var(--bg-main);
            color: #a9b1d6;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            padding: 20px;
            outline: none;
        }

        /* --- Execution Deck Panel --- */
        .execution-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .execution-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
        }

        .action-btn {
            background-color: var(--success);
            color: var(--bg-main);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(158, 206, 106, 0.2);
            transition: all 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .action-btn:disabled {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Logging Terminal Log Panel --- */
        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #050609;
            overflow: hidden;
        }

        .terminal-log {
            flex: 1;
            padding: 16px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #a9b1d6;
        }

        /* --- Drawer Configuration Overlay Layout --- */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: 340px;
            height: 100%;
            background-color: var(--bg-card);
            z-index: 25;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        body.drawer-open .drawer-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        body.drawer-open .drawer {
            transform: translateX(0);
        }

        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }

        .drawer-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .form-group input, .form-group select {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .log-info { color: var(--accent); }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .log-warn { color: var(--warning); }
    </style>
</head>
<body>

    <!-- --- Header Navigation Bar --- -->
    <header class="top-nav">
        <div class="nav-left">
            <button class="menu-btn" id="btnOpenDrawer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <span class="app-title" id="displayViewTitle">Editor</span>
        </div>
        <button class="btn-compile" id="btnCompile">Compile</button>
    </header>

    <!-- --- Screen State Viewports --- -->
    <main class="workspace-container">
        <!-- View 1: Application Script Text Field -->
        <div class="view-pane" id="viewEditor">
            <textarea id="codeEditor" spellcheck="false">#include <Arduino.h>

#define LED_PIN 2

void setup() {
    pinMode(LED_PIN, OUTPUT);
    Serial.begin(115200);
}

void loop() {
    digitalWrite(LED_PIN, HIGH);
    delay(1000);
    digitalWrite(LED_PIN, LOW);
    delay(1000);
}</textarea>
        </div>

        <!-- View 2: Compilation & Download Deck -->
        <div class="view-pane" id="viewExecution">
            <div class="execution-header">
                <div class="execution-meta">
                    <span class="status-badge"><span class="status-dot" id="statusDot"></span><span id="statusTxt">Ready</span></span>
                    <span style="font-size: 12px; color: var(--text-muted); cursor: pointer;" id="btnReturnEditor">← Back to Editor</span>
                </div>
                <button class="action-btn" id="btnDownloadBundle" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block; vertical-align:middle; margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download 4-File Flash Bundle (.ZIP)
                </button>
            </div>
            <div class="terminal-container">
                <div class="terminal-log" id="termLog"></div>
            </div>
        </div>
    </main>

    <!-- --- Setup Options Sliding Side Panel Drawer --- -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <nav class="drawer">
        <div class="drawer-header">
            <h3>Configuration</h3>
            <button class="drawer-close" id="btnCloseDrawer">×</button>
        </div>
        <div class="drawer-content">
            <div class="form-group">
                <label>Target Hardware Profile</label>
                <select id="boardType">
                    <option value="esp32">ESP32 Dev Module</option>
                    <option value="uno">Arduino Uno</option>
                    <option value="nano">Arduino Nano (ATmega328P)</option>
                </select>
            </div>
            <div class="form-group">
                <label>GitHub Username</label>
                <input type="text" id="ghUser" placeholder="Username">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="ghRepo" placeholder="Repository">
            </div>
            <div class="form-group">
                <label>Fine-Grained PAT</label>
                <input type="password" id="ghPat" placeholder="github_pat_...">
            </div>
        </div>
    </nav>

    <script>
        // UI Navigation Bindings
        function changeView(view) {
            if(view === 'editor') {
                document.body.classList.remove('show-execution');
                document.getElementById('displayViewTitle').textContent = "Editor";
            } else {
                document.body.classList.add('show-execution');
                document.getElementById('displayViewTitle').textContent = "Execution Deck";
            }
        }

        const term = {
            log: (msg, type = 'info') => {
                const logEl = document.getElementById('termLog');
                const span = document.createElement('span');
                span.className = `log-${type}`;
                span.textContent = `${msg}\n`;
                logEl.appendChild(span);
                logEl.scrollTop = logEl.scrollHeight;
            },
            clear: () => { document.getElementById('termLog').innerHTML = ''; }
        };

        document.getElementById('btnOpenDrawer').addEventListener('click', () => document.body.classList.add('drawer-open'));
        document.getElementById('btnCloseDrawer').addEventListener('click', () => document.body.classList.remove('drawer-open'));
        document.getElementById('drawerOverlay').addEventListener('click', () => document.body.classList.remove('drawer-open'));
        document.getElementById('btnReturnEditor').addEventListener('click', () => changeView('editor'));

        // Smart C++ Dependency Scanning Mapping Engine
        function extractDependencies(code) {
            const includeRegex = /#include\s*[<"]([^>"]+)[>"]/g;
            const foundLibraries = new Set();
            let match;
            const registryMap = { "ArduinoJson.h": "bblanchon/ArduinoJson", "DHT.h": "adafruit/DHT sensor library" };
            while ((match = includeRegex.exec(code)) !== null) {
                if (registryMap[match[1]]) foundLibraries.add(registryMap[match[1]]);
            }
            return Array.from(foundLibraries).join(', ');
        }

        // Native GitHub API Orchestrator Actions Engine Loop
        async function runCompilationPipeline() {
            const user = document.getElementById('ghUser').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            const pat = document.getElementById('ghPat').value.trim();
            const board = document.getElementById('boardType').value;
            const code = document.getElementById('codeEditor').value;

            if (!user || !repo || !pat) {
                alert("Credentials missing! Slide open the configuration panel and provide valid repository authorization options.");
                document.body.classList.add('drawer-open');
                return;
            }

            document.getElementById('btnCompile').disabled = true;
            document.getElementById('btnDownloadBundle').disabled = true;
            changeView('execution');
            term.clear();

            document.getElementById('statusTxt').textContent = "Compiling...";
            document.getElementById('statusDot').style.backgroundColor = "var(--warning)";
            term.log("Packaging code parameters and sending request payload to GitHub Actions...", 'info');

            const codeBase64 = btoa(encodeURIComponent(code).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));
            const dependencies = extractDependencies(code);

            const headers = {
                "Authorization": `Bearer ${pat}`,
                "Accept": "application/vnd.github.v3+json",
                "Content-Type": "application/json"
            };

            try {
                const dispatch = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/workflows/compile.yml/dispatches`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ ref: "main", inputs: { code_b64: codeBase64, board_type: board, libs_list: dependencies } })
                });

                if (!dispatch.ok) throw new Error(`Server execution dispatch rejected with code status: ${dispatch.status}`);
                
                term.log("Workflow triggered successfully. Synchronizing tracker steps...", 'info');
                await new Promise(r => setTimeout(r, 6000));

                let runId = null;
                for (let i = 0; i < 10; i++) {
                    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/runs?workflow=compile.yml`, { headers });
                    const data = await res.json();
                    if(data.workflow_runs && data.workflow_runs.length > 0) {
                        if(data.workflow_runs[0].status !== 'completed') {
                            runId = data.workflow_runs[0].id;
                            break;
                        }
                    }
                    await new Promise(r => setTimeout(r, 3000));
                }

                if(!runId) throw new Error("Could not intercept context run execution token.");
                term.log(`Linked live continuous runner container tracker ID: #${runId}`, 'info');

                let compilationSuccess = false;
                while(true) {
                    const statusCheck = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/runs/${runId}`, { headers });
                    const runData = await statusCheck.json();
                    term.log(`Container Build Engine Status: [${runData.status.toUpperCase()}]`, 'info');
                    if(runData.status === 'completed') {
                        compilationSuccess = (runData.conclusion === 'success');
                        break;
                    }
                    await new Promise(r => setTimeout(r, 5000));
                }

                // Append compilation history logs to panel interface terminal console
                const logsRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/compilation.log?ref=build-output`, { headers });
                if(logsRes.ok) {
                    const logData = await logsRes.json();
                    term.log("\n--- Standard Compiler Log Trace Outputs ---", 'info');
                    term.log(decodeURIComponent(escape(atob(logData.content.replace(/\s/g, '')))), 'info');
                }

                if(!compilationSuccess) throw new Error("Compilation aborted due to logic error checks or structural script dependency configuration flaws.");

                term.log("\nSuccess! All 4 binary targets compiled and collected inside output branch reference.", 'success');
                document.getElementById('statusTxt').textContent = "Finished";
                document.getElementById('statusDot').style.backgroundColor = "var(--success)";
                document.getElementById('btnDownloadBundle').disabled = false;

            } catch(e) {
                term.log(`\nPipeline Halted: ${e.message}`, 'error');
                document.getElementById('statusTxt').textContent = "Build Failed";
                document.getElementById('statusDot').style.backgroundColor = "var(--error)";
            } finally {
                document.getElementById('btnCompile').disabled = false;
            }
        }

        // --- One-Click Dynamic Zipball Retrieval Module ---
        async function fetchFirmwareBundleArchive() {
            const user = document.getElementById('ghUser').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            const pat = document.getElementById('ghPat').value.trim();

            term.log("Requesting auto-compressed branch zipball payload download allocations...", 'info');

            try {
                // Hits the native GitHub endpoint that instantly converts a targeted branch workspace structure into a flat zip package
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/zipball/build-output`, {
                    headers: {
                        "Authorization": `Bearer ${pat}`,
                        "Accept": "application/vnd.github.v3+json"
                    }
                });

                if(!response.ok) throw new Error("Could not pull zipball resource reference structures down.");

                const fileBlob = await response.blob();
                const clientDownloadUrl = window.URL.createObjectURL(fileBlob);
                
                // Programmatic anchor click trigger to pass data cleanly to the device download manager
                const tempAnchor = document.createElement('a');
                tempAnchor.href = clientDownloadUrl;
                tempAnchor.download = `${repo}-esp32-firmware.zip`;
                document.body.appendChild(tempAnchor);
                tempAnchor.click();
                tempAnchor.remove();
                
                window.URL.revokeObjectURL(clientDownloadUrl);
                term.log("ZIP firmware bundle downloaded cleanly. Extract it on your mobile storage disk to execute flash tools natively!", 'success');

            } catch(e) {
                term.log(`Archive download error encountered: ${e.message}`, 'error');
            }
        }

        document.getElementById('btnCompile').addEventListener('click', runCompilationPipeline);
        document.getElementById('btnDownloadBundle').addEventListener('click', fetchFirmwareBundleArchive);
    </script>
</body>
</html>
