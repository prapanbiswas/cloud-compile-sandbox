name: Ephemeral Cloud Compiler Container Engine

on:
  workflow_dispatch:
    inputs:
      code_b64:
        description: 'Microcontroller C++ Source Code encoded inside Base64 envelope format'
        required: true
      board_type:
        description: 'Target hardware environment execution profile'
        required: true
        default: 'esp32'
      libs_list:
        description: 'Comma separated list of dynamic library package string tags'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  instantiate_compile_sandbox:
    runs-on: ubuntu-latest

    steps:
    - name: Initialize Code Workspace Structures
      uses: actions/checkout@v4

    - name: Provision Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PlatformIO Core Component Toolchains
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Construct PlatformIO Project Context Structures
      run: |
        mkdir -p src
        mkdir -p lib
        
        if [ "${{ github.event.inputs.board_type }}" = "esp32" ]; then
          PLATFORM="espressif32"
          BOARD="esp32dev"
          FRAMEWORK="arduino"
        elif [ "${{ github.event.inputs.board_type }}" = "uno" ]; then
          PLATFORM="atmelavr"
          BOARD="uno"
          FRAMEWORK="arduino"
        elif [ "${{ github.event.inputs.board_type }}" = "nano" ]; then
          PLATFORM="atmelavr"
          BOARD="nanoatmega328"
          FRAMEWORK="arduino"
        fi
        
        echo "[env:${BOARD}]" > platformio.ini
        echo "platform = ${PLATFORM}" >> platformio.ini
        echo "board = ${BOARD}" >> platformio.ini
        echo "framework = ${FRAMEWORK}" >> platformio.ini
        
        if [ ! -z "${{ github.event.inputs.libs_list }}" ]; then
          echo "lib_deps =" >> platformio.ini
          echo "${{ github.event.inputs.libs_list }}" | sed 's/,/\n /g' >> platformio.ini
        fi

    - name: Extract Microcontroller Source Assets
      run: |
        echo "${{ github.event.inputs.code_b64 }}" | base64 -d > src/main.cpp

    - name: Execute Workspace Toolchain Compilation Task
      run: |
        pio run 2>&1 | tee compilation.log
        
        mkdir -p /tmp/build-artifacts
        cp compilation.log /tmp/build-artifacts/
        
        if [ "${{ github.event.inputs.board_type }}" = "esp32" ]; then
          cp .pio/build/esp32dev/firmware.bin /tmp/build-artifacts/firmware.bin
          cp .pio/build/esp32dev/bootloader.bin /tmp/build-artifacts/bootloader.bin
          cp .pio/build/esp32dev/partitions.bin /tmp/build-artifacts/partitions.bin
          
          # Capture the 4th file: boot_app0.bin (OTA boot app selector)
          if [ -f ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin ]; then
            cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin /tmp/build-artifacts/boot_app0.bin
          elif [ -f .pio/build/esp32dev/boot_app0.bin ]; then
            cp .pio/build/esp32dev/boot_app0.bin /tmp/build-artifacts/boot_app0.bin
          else
            # Fallback check if path styles differ across toolchain updates
            find .pio/build/ -name "boot_app0.bin" -exec cp {} /tmp/build-artifacts/boot_app0.bin \;
          fi
        else
          cp .pio/build/uno/firmware.hex /tmp/build-artifacts/firmware.bin
        fi

    - name: Persist Raw Application Compilation Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: compilation-history-logs
        path: /tmp/build-artifacts/compilation.log

    - name: Persist Executable Binary Outputs
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: targeted-microcontroller-firmware
        path: /tmp/build-artifacts/

    - name: Dispatch Outputs to Elicitation Client Content Interface Branches
      if: always()
      run: |
        git config --global user.name "Github Action Compiler"
        git config --global user.email "actions@github.com"
        
        git checkout --orphan build-output
        git rm -rf .
        
        cp /tmp/build-artifacts/compilation.log ./compilation.log || touch compilation.log
        git add compilation.log
        
        if [ -f /tmp/build-artifacts/firmware.bin ]; then
          cp /tmp/build-artifacts/firmware.bin ./firmware.bin
          git add firmware.bin
        fi
        if [ -f /tmp/build-artifacts/bootloader.bin ]; then
          cp /tmp/build-artifacts/bootloader.bin ./bootloader.bin
          git add bootloader.bin
        fi
        if [ -f /tmp/build-artifacts/partitions.bin ]; then
          cp /tmp/build-artifacts/partitions.bin ./partitions.bin
          git add partitions.bin
        fi
        if [ -f /tmp/build-artifacts/boot_app0.bin ]; then
          cp /tmp/build-artifacts/boot_app0.bin ./boot_app0.bin
          git add boot_app0.bin
        fi
        
        git commit -m "Deploy comprehensive 4-file production artifacts for run ID ${{ github.run_id }}"
        git push origin build-output --force
        
